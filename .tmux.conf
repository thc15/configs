


# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'seebi/tmux-colors-solarized'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set-option -g history-limit 10000
set -s escape-time 0
setw -g aggressive-resize on
set-option -g default-shell /usr/bin/bash
set-window-option -g mode-keys vi
setw -g mode-keys vi

bind-key R respawn-pane -k \; display 'Respawned Pane!'

bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'

#urxvt tab like window switching (-n: no prior escape seq)
bind k confirm kill-window
bind l last-window
bind space command-prompt -p index "select-window"
bind r source-file ~/.tmux.conf
bind-key g set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# Solarized theme
set -g @plugin 'seebi/tmux-colors-solarized'
set -g @colors-solarized 'dark'
# powerline
source ~/.local/lib/python2.7/site-packages/powerline/bindings/tmux/powerline.conf
#set-option -g default-terminal "screen-256color"
set-option -g status-position top
set-option -g status on
#set-option -g status-interval 4
#set-option -g status-justify "centre"
#set-option -g status-left-length 100
#set-option -g status-right-length 100
set-option -g status-left "#(~/.local/bin/powerline left)"
set-option -g status-right "#(~/.local/bin/powerline right)"
#set -g status-left "session: #S || window: #I || pane: #P"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
bind = select-layout even-horizontal

# set pane colors - highlight the active pane
setw -g pane-border-status top
#setw -g pane-border-format '─'
set-option -g pane-active-border-style "bg=default"
set-option -g pane-active-border-style "fg=colour2"
#set-option -g pane-border-style "bg=color58 fg=colour64"

bind-key -n S-Left  previous-window
bind-key -n S-Right next-window

## set inactive/active window styles
#set -g window-style 'fg=colour247,bg=colour236'
#set -g window-active-style 'fg=colour250,bg=234'
#set -g window-style 'fg=default,bg=default'
#set -g window-active-style 'fg=default,bg=default'

set-option -g set-clipboard off
# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# Sane scrolling
# fixes shift-pageup/shift-pagedown
set -ga terminal-overrides 'xterm*:smcup@:rmcup@'
set -ga terminal-override ',rxvt-uni*:XT:Ms=\E]52;%p1%s;%p2%s\007'
set-window-option -g xterm-keys on

# Optional but convenient: use C-b v to paste the tmux buffer.
bind v paste-buffer

set -g @yank_selection 'clipboard' # 'primary' 'secondary' 'clipboard'
set -g @yank_with_mouse on

### Clipboard integration
bind-key -T copy-mode DoubleClick1Pane select-pane\; send -X select-word\; run "tmux save-buffer - | xclip -i -sel clipboard > /dev/null"
## Selection with mouse should copy to clipboard right away, in addition to the default action.
unbind -n -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel\; run "tmux save-buffer - | xclip -i -sel clipboard > /dev/null"

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M

# To copy, left click and drag to highlight text in yellow, 
# # once you release left click yellow text will disappear and will automatically be available in clibboard
# # # Use vim keybindings in copy mode
# setw -g mode-keys vi
# # Update default binding of `Enter` to also use copy-pipe
# unbind -T copy-mode-vi Enter
# bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection c"
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

set-option -ga terminal-overrides ",st-256color:Tc"
set -g default-terminal "st-256color"

set-window-option -g status-left " #S "
set-window-option -g status-right " %H:%M %d-%b-%y "
set-window-option -g window-status-format " #I: #W "

set-window-option -g window-status-current-format " #I: #W "

bind-key b send-keys -R \; clear-history

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

unbind e
bind e split-window -h -l 80

set -g @shell_mode 'vi'

set-option -g automatic-rename off
set-option -g allow-rename off
# visual notification of activity in other windows
setw -g monitor-activity on
set -g visual-activity on

set -g focus-events on

#set -g @colors-solarized 'dark'

set -g @continuum-restore 'on'
#run-shell ~/.tmux/plugins/tmux-yank/yank.tmux
#set -g @resurrect-capture-pane-contents 'on'

set-option -g default-command "/bin/bash"
set-option -g default-shell "/bin/bash"

run-shell "powerline-daemon -q ; powerline-config tmux setup"

# EOF
run '~/.tmux/plugins/tpm/tpm'
