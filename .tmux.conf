


# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix


set-option -g history-limit 10000000
set -s escape-time 0
setw -g aggressive-resize on

bind-key R respawn-pane -k \; display 'Respawned Pane!'

bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# set pane colors - highlight the active pane
set -g pane-border-fg white
set -g pane-border-bg black
set -g pane-active-border-fg green
set -g pane-active-border-bg black

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

## to enable mouse scroll, see https://github.com/tmux/tmux/issues/145#issuecomment-150736967
#bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -T root MouseDown2Pane run -b "xclip -o | tmux load-buffer - && tmux paste-buffer -s ' '"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -selection primary -i" \; display-message "highlighted selection copied to system clipboard xclip -selection pri"

## Drag to re-order windows
#bind-key -n MouseDrag1Status swap-window -t=

set-option -g set-clipboard on
set -g mouse on

#bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
#bind -n WheelDownPane select-pane -t= \; send-keys -M
#bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
#bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
#bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
#bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
#bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clibboard
setw -g mode-keys vi
# Vi copypaste mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection c"

# powerline
set -g default-terminal "screen-256color"
source-file ~/softs/powerline/powerline/bindings/tmux/powerline.conf
set-option -g status on
set-option -g status-interval 4
set-option -g status-justify "centre"
set-option -g status-left-length 40
set-option -g status-right-length 90
#set-option -g status-left "#(~/bin/powerline left)"
#set-option -g status-right "#(~/bin/powerline right)"

set-option -g status-position top

#urxvt tab like window switching (-n: no prior escape seq)
bind -n C-q confirm-before -p "kill-window #W? (y/n)" kill-window
#bind -n S-left prev
#bind -n S-right next

set-option -g automatic-rename off
set-option -g allow-rename off
# visual notification of activity in other windows
setw -g monitor-activity on
set -g visual-activity on

# fixes shift-pageup/shift-pagedown
set -ga terminal-overrides ',xterm*:smcup@:rmcup@'
#bind -n Pageup copy-mode -u

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'seebi/tmux-colors-solarized'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
run-shell ~/.tmux/plugins/tmux-yank/yank.tmux

# Sessions
bind s source-file ~/.tmux.conf

set -g @colors-solarized 'dark'

set-option -g default-command "/bin/bash"
set-option -g default-shell "/bin/bash"

# EOF
run '~/.tmux/plugins/tpm/tpm'
